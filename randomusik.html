<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randomusik</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131f;
    --purple: #9333ea;
    --pink: #ec4899;
    --yellow: #fbbf24;
    --cyan: #22d3ee;
    --green: #4ade80;
    --orange: #fb923c;
    --text: #f1f5f9;
    --muted: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(147,51,234,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(236,72,153,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 60% 10%, rgba(34,211,238,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ========== FLOATING NOTES ========== */
  .notes-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .note {
    position: absolute;
    font-size: 1.5rem;
    opacity: 0;
    animation: floatNote 8s ease-in-out infinite;
  }
  @keyframes floatNote {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    20% { opacity: 0.15; }
    80% { opacity: 0.1; }
    100% { opacity: 0; transform: translateY(-120px) rotate(20deg); }
  }

  /* ========== HOME SCREEN ========== */
  #home {
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    gap: 1.5rem;
  }

  .logo-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .logo-icon {
    font-size: 5rem;
    filter: drop-shadow(0 0 30px rgba(147,51,234,0.8));
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 30px rgba(147,51,234,0.8)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 50px rgba(236,72,153,0.9)); transform: scale(1.05); }
  }

  .logo-text {
    font-family: 'Boogaloo', cursive;
    font-size: 3.5rem;
    background: linear-gradient(135deg, var(--purple), var(--pink), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    line-height: 1;
  }

  .logo-sub {
    font-size: 1rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .tagline {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 280px;
    line-height: 1.5;
    animation: fadeUp 0.6s 0.3s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none;
    border-radius: 50px;
    padding: 1rem 2.5rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    color: white;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(147,51,234,0.5);
    transition: all 0.2s;
    animation: fadeUp 0.6s 0.5s both;
  }
  .btn-primary:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(147,51,234,0.7); }
  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    padding: 0.8rem 2rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--purple); color: var(--text); }

  .spotify-badge {
    display: flex; align-items: center; gap: 0.5rem;
    background: rgba(30,215,96,0.1);
    border: 1px solid rgba(30,215,96,0.3);
    border-radius: 50px;
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    color: #1ed760;
    font-weight: 700;
    animation: fadeUp 0.6s 0.7s both;
  }
  .spotify-dot { width: 8px; height: 8px; background: #1ed760; border-radius: 50%; animation: pulse 1.5s infinite; }

  /* ========== SETUP SCREEN ========== */
  #setup {
    padding: 1.5rem;
    gap: 1.2rem;
  }

  .screen-header {
    display: flex; align-items: center; gap: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .back-btn {
    background: rgba(255,255,255,0.08);
    border: none; border-radius: 50%;
    width: 40px; height: 40px;
    cursor: pointer; color: white; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.15); }

  .screen-title {
    font-family: 'Boogaloo', cursive;
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 0.6rem;
  }

  /* Players */
  .players-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .player-row {
    display: flex; align-items: center; gap: 0.8rem;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 0.7rem 1rem;
  }
  .player-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 900; color: white;
    flex-shrink: 0;
  }
  .player-name-input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 700; flex: 1;
  }
  .player-name-input::placeholder { color: var(--muted); }
  .remove-player {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1.1rem; padding: 0 0.2rem;
    transition: color 0.2s;
  }
  .remove-player:hover { color: var(--pink); }

  .add-player-btn {
    background: transparent;
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    transition: all 0.2s;
    width: 100%;
  }
  .add-player-btn:hover { border-color: var(--purple); color: var(--purple); }

  /* Categories */
  .categories-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.6rem;
  }
  .cat-chip {
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0.7rem 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--muted);
  }
  .cat-chip.selected {
    border-color: currentColor;
    color: white;
    background: rgba(255,255,255,0.05);
  }
  .cat-chip.selected .cat-check { opacity: 1; }
  .cat-check { margin-left: auto; opacity: 0; transition: opacity 0.2s; font-size: 0.9rem; }

  /* Difficulty */
  .diff-row { display: flex; gap: 0.6rem; }
  .diff-btn {
    flex: 1;
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0.8rem 0.5rem;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--muted);
    text-align: center;
    transition: all 0.2s;
  }
  .diff-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,0.08); }
  .diff-emoji { font-size: 1.3rem; display: block; margin-bottom: 0.2rem; }

  /* ========== GAME SCREEN ========== */
  #game {
    padding: 1.2rem;
    align-items: center;
    gap: 1rem;
  }

  .game-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .game-logo {
    font-family: 'Boogaloo', cursive;
    font-size: 1.4rem;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .round-badge {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 0.3rem 0.9rem;
    font-size: 0.8rem;
    font-weight: 800;
    color: var(--muted);
  }

  /* Scoreboard */
  .scoreboard {
    width: 100%;
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding-bottom: 0.3rem;
  }
  .score-card {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 0.6rem 0.9rem;
    text-align: center;
    min-width: 70px;
    transition: all 0.3s;
  }
  .score-card.winner-glow {
    border-color: var(--yellow);
    box-shadow: 0 0 20px rgba(251,191,36,0.3);
  }
  .score-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 900; color: white;
    margin: 0 auto 0.3rem;
  }
  .score-name { font-size: 0.7rem; font-weight: 700; color: var(--muted); }
  .score-pts {
    font-family: 'Boogaloo', cursive;
    font-size: 1.4rem;
    color: var(--text);
    line-height: 1;
  }

  /* Wheel */
  .wheel-container {
    position: relative;
    width: 300px; height: 300px;
    flex-shrink: 0;
  }
  .wheel-pointer {
    position: absolute;
    top: -18px; left: 50%;
    transform: translateX(-50%);
    font-size: 2rem;
    z-index: 10;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    animation: pointerBounce 0.5s ease-in-out;
  }
  @keyframes pointerBounce {
    0%, 100% { transform: translateX(-50%) rotate(0deg); }
    50% { transform: translateX(-50%) rotate(-10deg); }
  }

  canvas#wheel {
    width: 100%; height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(147,51,234,0.4), 0 0 120px rgba(236,72,153,0.2);
  }

  .spin-btn {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none; border-radius: 50px;
    padding: 1rem 2.5rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1.3rem; font-weight: 900;
    color: white; cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(147,51,234,0.5);
    transition: all 0.2s;
    width: 100%;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(147,51,234,0.7); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ========== PLAYING SCREEN ========== */
  #playing {
    padding: 1.5rem;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    text-align: center;
  }

  .category-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 0.4rem 1.2rem;
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .music-visual {
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--card);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    border: 3px solid rgba(255,255,255,0.1);
  }
  .music-visual::before {
    content: '';
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 2px solid var(--purple);
    opacity: 0;
    animation: sonarPulse 1.5s ease-out infinite;
  }
  .music-visual::after {
    content: '';
    position: absolute; inset: -20px;
    border-radius: 50%;
    border: 2px solid var(--pink);
    opacity: 0;
    animation: sonarPulse 1.5s 0.5s ease-out infinite;
  }
  @keyframes sonarPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.2); opacity: 0; }
  }
  .music-disc {
    font-size: 5rem;
    animation: spin 4s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .song-reveal {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 1.2rem 1.5rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .song-reveal.hidden .song-info { filter: blur(8px); user-select: none; }
  .reveal-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: var(--muted); margin-bottom: 0.6rem; text-transform: uppercase; }
  .song-name {
    font-family: 'Boogaloo', cursive;
    font-size: 1.8rem;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 0.3rem;
  }
  .artist-name { font-size: 1rem; font-weight: 700; color: var(--pink); }

  .reveal-btn {
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    border: none; border-radius: 50px;
    padding: 0.9rem 2rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem; font-weight: 900;
    color: #0a0a0f; cursor: pointer;
    box-shadow: 0 6px 25px rgba(251,191,36,0.4);
    transition: all 0.2s;
    width: 100%; max-width: 360px;
  }
  .reveal-btn:hover { transform: translateY(-2px); }

  .point-btns {
    display: flex; flex-direction: column; gap: 0.6rem;
    width: 100%; max-width: 360px;
  }
  .point-btn {
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 0.7rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    color: var(--text);
    transition: all 0.2s;
  }
  .point-btn:hover { border-color: var(--green); background: rgba(74,222,128,0.07); }
  .point-badge {
    background: var(--green); color: #0a0a0f;
    border-radius: 50px; padding: 0.15rem 0.6rem;
    font-size: 0.8rem; font-weight: 900;
  }

  .next-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 0.7rem 2rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    color: var(--muted); cursor: pointer;
    transition: all 0.2s;
    width: 100%; max-width: 360px;
  }
  .next-btn:hover { border-color: var(--purple); color: var(--text); }

  /* ========== WINNER SCREEN ========== */
  #winner {
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    gap: 1.2rem;
  }

  .confetti-wrap { font-size: 3rem; animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes bounceIn {
    from { opacity: 0; transform: scale(0.3); }
    to { opacity: 1; transform: scale(1); }
  }

  .winner-name {
    font-family: 'Boogaloo', cursive;
    font-size: 3rem;
    background: linear-gradient(135deg, var(--yellow), var(--orange), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .winner-pts { font-size: 1.1rem; color: var(--muted); font-weight: 700; }

  .final-scores {
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .final-row {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 0.8rem 1.2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .final-row.top { border-color: var(--yellow); background: rgba(251,191,36,0.06); }
  .rank { font-family: 'Boogaloo', cursive; font-size: 1.3rem; color: var(--muted); width: 28px; }
  .final-name { flex: 1; font-weight: 700; }
  .final-pts { font-family: 'Boogaloo', cursive; font-size: 1.4rem; color: var(--yellow); }

  /* Utility */
  .hidden { display: none !important; }
  .flex-center { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<!-- Floating notes -->
<div class="notes-bg" id="notesBg"></div>

<!-- ========== HOME ========== -->
<div class="screen active" id="home">
  <div class="logo-wrap">
    <div class="logo-icon">🎵</div>
    <div class="logo-text">RANDOMUSIK</div>
    <div class="logo-sub">Party Music Game</div>
  </div>
  <p class="tagline">Gira la ruleta, suena la canción, ¡adivina y gana!</p>
  <button class="btn-primary" onclick="goTo('setup')">🎲 Crear Partida</button>
  <div class="spotify-badge">
    <div class="spotify-dot"></div>
    Powered by Spotify
  </div>
</div>

<!-- ========== SETUP ========== -->
<div class="screen" id="setup">
  <div class="screen-header">
    <button class="back-btn" onclick="goTo('home')">←</button>
    <div class="screen-title">Configurar Partida</div>
  </div>

  <!-- Players -->
  <div>
    <div class="section-label">👥 Jugadores</div>
    <div class="players-list" id="playersList"></div>
    <button class="add-player-btn" onclick="addPlayer()">+ Añadir jugador</button>
  </div>

  <!-- Categories -->
  <div>
    <div class="section-label">🎛️ Categorías de la Ruleta</div>
    <div class="categories-grid" id="catsGrid"></div>
  </div>

  <!-- Difficulty -->
  <div>
    <div class="section-label">⚡ Dificultad</div>
    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy" onclick="setDiff(this)">
        <span class="diff-emoji">😄</span>Fácil
      </button>
      <button class="diff-btn" data-diff="normal" onclick="setDiff(this)">
        <span class="diff-emoji">🤔</span>Normal
      </button>
      <button class="diff-btn" data-diff="hard" onclick="setDiff(this)">
        <span class="diff-emoji">🔥</span>Difícil
      </button>
    </div>
  </div>

  <button class="btn-primary" onclick="startGame()" style="margin-top:auto">🎰 ¡Jugar!</button>
</div>

<!-- ========== GAME (WHEEL) ========== -->
<div class="screen" id="game">
  <div class="game-header" style="width:100%">
    <div class="game-logo">🎵 Randomusik</div>
    <div class="round-badge">Ronda <span id="roundNum">1</span></div>
  </div>

  <div class="scoreboard" id="scoreboard"></div>

  <div class="wheel-container">
    <div class="wheel-pointer">▼</div>
    <canvas id="wheel" width="300" height="300"></canvas>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎲 ¡GIRAR!</button>
</div>

<!-- ========== PLAYING ========== -->
<div class="screen" id="playing">
  <div class="category-tag" id="playingCat">🎸 Rock Clásico</div>

  <div class="music-visual">
    <div class="music-disc" id="musicDisc">💿</div>
  </div>

  <div class="song-reveal hidden" id="songReveal">
    <div class="reveal-label">La canción es...</div>
    <div class="song-info">
      <div class="song-name" id="songName">Bohemian Rhapsody</div>
      <div class="artist-name" id="artistName">Queen</div>
    </div>
  </div>

  <button class="reveal-btn" id="revealBtn" onclick="revealSong()">👁️ Revelar Canción</button>

  <div class="point-btns hidden" id="pointBtns"></div>

  <button class="next-btn hidden" id="nextBtn" onclick="nextRound()">Siguiente ronda →</button>
</div>

<!-- ========== WINNER ========== -->
<div class="screen" id="winner">
  <div class="confetti-wrap">🏆</div>
  <div style="font-size:1.1rem; color:var(--muted); font-weight:700;">¡Tenemos ganador!</div>
  <div class="winner-name" id="winnerName">Carlos</div>
  <div class="winner-pts" id="winnerPts">8 puntos</div>
  <div class="final-scores" id="finalScores"></div>
  <button class="btn-primary" onclick="goTo('home')" style="margin-top:0.5rem">🔄 Jugar de nuevo</button>

<script>
// ========== DATA ==========
const CATEGORIES = [

const SONGS = {

    { name: "Don't Stop Believin'", artist: "Journey" },
    { name: "Africa", artist: "Toto" },
    { name: "Take On Me", artist: "a-ha" },

  ],

  ],
  "Pop 2000s": [

    { name: "Beautiful Day", artist: "U2" },
    { name: "Hips Don't Lie", artist: "Shakira" },
  ],
  "Rock Clásico": [
    { name: "Bohemian Rhapsody", artist: "Queen" },
    { name: "Hotel California", artist: "Eagles" },
    { name: "Stairway to Heaven", artist: "Led Zeppelin" },

  ],
  "Reggaeton": [
    { name: "Gasolina", artist: "Daddy Yankee" },
    { name: "Despacito", artist: "Luis Fonsi" },
    { name: "Con Calma", artist: "Daddy Yankee" },

  ],
  "Pop Latino": [
    { name: "Bailando", artist: "Enrique Iglesias" },

    { name: "Waka Waka", artist: "Shakira" },
    { name: "Clandestino", artist: "Shakira" },
  ],
  "Pop 2020s": [
    { name: "Blinding Lights", artist: "The Weeknd" },
    { name: "Levitating", artist: "Dua Lipa" },
    { name: "drivers license", artist: "Olivia Rodrigo" },
    { name: "As It Was", artist: "Harry Styles" },
  ],
  "Baladas": [
    { name: "My Heart Will Go On", artist: "Céline Dion" },
    { name: "Nothing Compares 2 U", artist: "Sinéad O'Connor" },

  ],
  "Grupero": [
    { name: "La Chona", artist: "Los Tucanes de Tijuana" },
    { name: "El Rey", artist: "Vicente Fernández" },
    { name: "Amor Eterno", artist: "Rocío Dúrcal" },

  ],
  "Indie / Alt": [
    { name: "Mr. Brightside", artist: "The Killers" },
    { name: "Somebody That I Used to Know", artist: "Gotye" },
    { name: "Creep", artist: "Radiohead" },
    { name: "Ho Hey", artist: "The Lumineers" },
  ],
  "Party Hits": [
    { name: "Can't Stop the Feeling!", artist: "Justin Timberlake" },
    { name: "Uptown Funk", artist: "Mark Ronson" },
    { name: "Happy", artist: "Pharrell Williams" },
    { name: "Shake It Off", artist: "Taylor Swift" },
  ],
  "K-Pop": [
    { name: "Dynamite", artist: "BTS" },
    { name: "How You Like That", artist: "BLACKPINK" },
    { name: "Gangnam Style", artist: "PSY" },
    { name: "Kill This Love", artist: "BLACKPINK" },
  ],
};

const AVATARS = ["🎵","🎸","🎹","🎺","🥁","🎷","🎻","🎤"];
const AVATAR_COLORS = ["#9333ea","#ec4899","#22d3ee","#4ade80","#fbbf24","#f97316","#818cf8","#f472b6"];

// ========== STATE ==========
let players = [
  { name: "Carlos", avatar: 0 },
  { name: "Emilio", avatar: 1 },
];
let selectedCats = [0, 1, 2, 3, 4, 6];
let difficulty = "easy";
let scores = {};
let round = 1;
let spinning = false;
let currentCat = null;
let currentSong = null;
let songRevealed = false;
const MAX_ROUNDS = 10;

// ========== NAVIGATION ==========
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ========== FLOATING NOTES ==========
function spawnNotes() {
  const bg = document.getElementById('notesBg');
  const notes = ['🎵','🎶','🎸','🎹','🥁','🎺','🎷'];
  for (let i = 0; i < 12; i++) {
    const n = document.createElement('div');
    n.className = 'note';
    n.textContent = notes[Math.floor(Math.random() * notes.length)];
    n.style.left = Math.random() * 100 + '%';
    n.style.top = (30 + Math.random() * 60) + '%';
    n.style.animationDelay = (Math.random() * 8) + 's';
    n.style.animationDuration = (6 + Math.random() * 6) + 's';
    bg.appendChild(n);
  }
}
spawnNotes();

// ========== SETUP ==========
function renderPlayers() {
  const list = document.getElementById('playersList');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <div class="player-avatar" style="background:${AVATAR_COLORS[p.avatar % AVATAR_COLORS.length]}">${AVATARS[p.avatar % AVATARS.length]}</div>
      <input class="player-name-input" value="${p.name}" placeholder="Nombre del jugador"
        oninput="players[${i}].name = this.value">
      ${players.length > 2 ? `<button class="remove-player" onclick="removePlayer(${i})">✕</button>` : ''}
    `;
    list.appendChild(row);
  });
}

function addPlayer() {
  if (players.length >= 8) return;
  players.push({ name: `Jugador ${players.length + 1}`, avatar: players.length });
  renderPlayers();
}
function removePlayer(i) {
  players.splice(i, 1);
  renderPlayers();
}

function renderCats() {
  const grid = document.getElementById('catsGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach((cat, i) => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (selectedCats.includes(i) ? ' selected' : '');
    chip.style.color = cat.color;
    chip.innerHTML = `${cat.emoji} ${cat.name}<span class="cat-check">✓</span>`;
    chip.onclick = () => toggleCat(i, chip);
    grid.appendChild(chip);
  });
}

function toggleCat(i, el) {
  if (selectedCats.includes(i)) {
    if (selectedCats.length <= 3) return;
    selectedCats = selectedCats.filter(c => c !== i);
    el.classList.remove('selected');
  } else {
    selectedCats.push(i);
    el.classList.add('selected');
  }
}

function setDiff(btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  difficulty = btn.dataset.diff;
}

// ========== WHEEL ==========
let wheelAngle = 0;
let wheelSegments = [];

function buildWheel() {
  wheelSegments = selectedCats.map(i => CATEGORIES[i]);
  drawWheel(wheelAngle);
}

function drawWheel(angle) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = 150, cy = 150, r = 145;
  const n = wheelSegments.length;
  const arc = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, 300, 300);

  // Shadow/glow
  ctx.save();
  ctx.shadowBlur = 30;
  ctx.shadowColor = 'rgba(147,51,234,0.5)';

  wheelSegments.forEach((seg, i) => {
    const start = angle + i * arc - Math.PI / 2;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.color + 'cc';
    ctx.fill();
    ctx.strokeStyle = '#0a0a0f';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
  ctx.restore();

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(1, '#0a0a0f');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center emoji
  ctx.font = '20px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🎵', cx, cy);

  // Labels
  wheelSegments.forEach((seg, i) => {
    const mid = angle + i * arc - Math.PI / 2 + arc / 2;
    const labelR = r * 0.62;
    const lx = cx + labelR * Math.cos(mid);
    const ly = cy + labelR * Math.sin(mid);

    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(mid + Math.PI / 2);

    ctx.font = 'bold 10px Nunito, sans-serif';
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;

    const words = seg.name.split(' ');
    if (words.length > 1 && seg.name.length > 10) {
      ctx.fillText(seg.emoji, 0, -9);
      ctx.font = 'bold 9px Nunito, sans-serif';
      ctx.fillText(words[0], 0, 2);
      ctx.fillText(words.slice(1).join(' '), 0, 12);
    } else {
      ctx.fillText(seg.emoji, 0, -7);
      ctx.font = 'bold 9px Nunito, sans-serif';
      ctx.fillText(seg.name, 0, 5);
    }
    ctx.restore();
  });
}

function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const extraSpins = 5 + Math.random() * 5;
  const targetAngle = wheelAngle + (2 * Math.PI * extraSpins) + (Math.random() * 2 * Math.PI);
  const duration = 3000 + Math.random() * 1000;
  const startAngle = wheelAngle;
  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    wheelAngle = startAngle + (targetAngle - startAngle) * easeOut(progress);
    drawWheel(wheelAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      wheelAngle = targetAngle % (2 * Math.PI);
      onSpinEnd();
    }
  }
  requestAnimationFrame(animate);
}

function onSpinEnd() {
  const n = wheelSegments.length;
  const arc = (2 * Math.PI) / n;
  const normalized = (((-wheelAngle + Math.PI / 2) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const idx = Math.floor(normalized / arc) % n;
  currentCat = wheelSegments[idx];

  setTimeout(() => {
    loadSong(currentCat);
    goTo('playing');
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
  }, 600);
}

// ========== PLAYING ==========
function loadSong(cat) {
  songRevealed = false;
  const pool = SONGS[cat.name] || SONGS["Party Hits"];
  currentSong = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById('playingCat').textContent = cat.emoji + ' ' + cat.name;
  document.getElementById('playingCat').style.color = cat.color;
  document.getElementById('playingCat').style.borderColor = cat.color + '40';
  document.getElementById('songName').textContent = currentSong.name;
  document.getElementById('artistName').textContent = currentSong.artist;

  const reveal = document.getElementById('songReveal');
  reveal.classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');
  document.getElementById('pointBtns').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
}

function revealSong() {
  songRevealed = true;
  document.getElementById('songReveal').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('pointBtns').classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  renderPointBtns();
}

function renderPointBtns() {
  const div = document.getElementById('pointBtns');
  div.innerHTML = '<div style="font-size:0.75rem;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:0.3rem">¿Quién adivinó?</div>';
  players.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'point-btn';
    btn.innerHTML = `
      <span>${AVATARS[p.avatar % AVATARS.length]} ${p.name}</span>
      <span class="point-badge">+1 pt</span>
    `;
    btn.onclick = () => awardPoint(p.name, btn);
    div.appendChild(btn);
  });
}

function awardPoint(name, btn) {
  scores[name] = (scores[name] || 0) + 1;
  btn.style.borderColor = 'var(--green)';
  btn.style.background = 'rgba(74,222,128,0.12)';
  btn.disabled = true;
  document.querySelectorAll('.point-btn').forEach(b => b.disabled = true);
  renderScoreboard();

  if (round >= MAX_ROUNDS || Object.values(scores).some(s => s >= 10)) {
    document.getElementById('nextBtn').textContent = '🏆 Ver Ganador';
    document.getElementById('nextBtn').onclick = showWinner;
  }
}

function nextRound() {
  round++;
  document.getElementById('roundNum').textContent = round;
  goTo('game');
}

// ========== SCOREBOARD ==========
function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  const maxPts = Math.max(...Object.values(scores));
  players.forEach(p => {
    const pts = scores[p.name] || 0;
    const card = document.createElement('div');
    card.className = 'score-card' + (pts === maxPts && pts > 0 ? ' winner-glow' : '');
    card.innerHTML = `
      <div class="score-avatar" style="background:${AVATAR_COLORS[p.avatar % AVATAR_COLORS.length]}">${AVATARS[p.avatar % AVATARS.length]}</div>
      <div class="score-name">${p.name}</div>
      <div class="score-pts">${pts}</div>
    `;
    sb.appendChild(card);
  });
}

// ========== WINNER ==========
function showWinner() {
  const sorted = players.map(p => ({ name: p.name, avatar: p.avatar, pts: scores[p.name] || 0 }))
    .sort((a, b) => b.pts - a.pts);
  const w = sorted[0];
  document.getElementById('winnerName').textContent = w.name;
  document.getElementById('winnerPts').textContent = `${w.pts} punto${w.pts !== 1 ? 's' : ''}`;

  const fs = document.getElementById('finalScores');
  fs.innerHTML = '';
  const medals = ['🥇','🥈','🥉'];
  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'final-row' + (i === 0 ? ' top' : '');
    row.innerHTML = `
      <div class="rank">${medals[i] || (i + 1)}</div>
      <div class="final-name">${AVATARS[p.avatar % AVATARS.length]} ${p.name}</div>
      <div class="final-pts">${p.pts} pts</div>
    `;
    fs.appendChild(row);
  });
  goTo('winner');
}

// ========== START GAME ==========
function startGame() {
  if (selectedCats.length < 3) { alert('Selecciona al menos 3 categorías'); return; }
  const names = players.map(p => p.name.trim()).filter(Boolean);
  if (names.length < 2) { alert('Necesitas al menos 2 jugadores'); return; }

  scores = {};
  round = 1;
  players.forEach(p => scores[p.name] = 0);
  document.getElementById('roundNum').textContent = '1';

  buildWheel();
  renderScoreboard();
  goTo('game');
}

// ========== INIT ==========
renderPlayers();
renderCats();
