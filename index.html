<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randomusik — Party Music Game</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131f;
    --purple: #9333ea;
    --pink: #ec4899;
    --yellow: #fbbf24;
    --cyan: #22d3ee;
    --green: #4ade80;
    --orange: #fb923c;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --spotify: #1ed760;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(147,51,234,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(236,72,153,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 60% 10%, rgba(34,211,238,0.1) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* FLOATING NOTES */
  .notes-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .note {
    position: absolute; font-size: 1.5rem; opacity: 0;
    animation: floatNote 8s ease-in-out infinite;
  }
  @keyframes floatNote {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    20% { opacity: 0.15; } 80% { opacity: 0.1; }
    100% { opacity: 0; transform: translateY(-120px) rotate(20deg); }
  }

  /* HOME */
  #home { align-items: center; justify-content: center; padding: 2rem; text-align: center; gap: 1.5rem; }

  .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

  .logo-icon { font-size: 5rem; filter: drop-shadow(0 0 30px rgba(147,51,234,0.8)); animation: pulseGlow 2s ease-in-out infinite; }
  @keyframes pulseGlow {
    0%,100% { filter: drop-shadow(0 0 30px rgba(147,51,234,0.8)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 50px rgba(236,72,153,0.9)); transform: scale(1.05); }
  }

  .logo-text {
    font-family: 'Boogaloo', cursive; font-size: 3.5rem; letter-spacing: 2px; line-height: 1;
    background: linear-gradient(135deg, var(--purple), var(--pink), var(--yellow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo-sub { font-size: 1rem; color: var(--muted); font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }
  .tagline { font-size: 1.1rem; color: var(--muted); max-width: 280px; line-height: 1.5; animation: fadeUp 0.6s 0.3s both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .btn-primary {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none; border-radius: 50px; padding: 1rem 2.5rem;
    font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 900;
    color: white; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(147,51,234,0.5); transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(147,51,234,0.7); }
  .btn-primary:active { transform: scale(0.97); }

  .spotify-status {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 1.2rem; border-radius: 50px; font-size: 0.85rem; font-weight: 700;
    animation: fadeUp 0.6s 0.7s both;
    background: rgba(30,215,96,0.1); border: 1px solid rgba(30,215,96,0.3); color: var(--spotify);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--spotify); animation: pulseGlow 1.5s infinite; }

  /* SETUP */
  #setup { padding: 1.5rem; gap: 1.2rem; }

  .screen-header { display: flex; align-items: center; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .back-btn {
    background: rgba(255,255,255,0.08); border: none; border-radius: 50%;
    width: 40px; height: 40px; cursor: pointer; color: white; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.15); }
  .screen-title {
    font-family: 'Boogaloo', cursive; font-size: 1.8rem;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .section-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--purple); margin-bottom: 0.6rem; }

  .players-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .player-row {
    display: flex; align-items: center; gap: 0.8rem;
    background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 0.7rem 1rem;
  }
  .player-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; color: white; flex-shrink: 0; }
  .player-name-input { background: transparent; border: none; outline: none; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; flex: 1; min-width: 0; }
  .player-name-input::placeholder { color: var(--muted); }
  .remove-player { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0 0.2rem; transition: color 0.2s; }
  .remove-player:hover { color: var(--pink); }
  .add-player-btn {
    background: transparent; border: 2px dashed rgba(255,255,255,0.15); border-radius: 14px;
    padding: 0.7rem; color: var(--muted); cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700; transition: all 0.2s; width: 100%;
  }
  .add-player-btn:hover { border-color: var(--purple); color: var(--purple); }

  .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
  .cat-chip {
    background: var(--card); border: 2px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 0.7rem 0.8rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-weight: 700; color: var(--muted);
  }
  .cat-chip.selected { border-color: currentColor; color: white; background: rgba(255,255,255,0.05); }
  .cat-chip.selected .cat-check { opacity: 1; }
  .cat-check { margin-left: auto; opacity: 0; transition: opacity 0.2s; font-size: 0.9rem; }

  .diff-row { display: flex; gap: 0.6rem; }
  .diff-btn {
    flex: 1; background: var(--card); border: 2px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 0.8rem 0.5rem; cursor: pointer; font-family: 'Nunito', sans-serif;
    font-size: 0.85rem; font-weight: 800; color: var(--muted); text-align: center; transition: all 0.2s;
  }
  .diff-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,0.08); }
  .diff-emoji { font-size: 1.3rem; display: block; margin-bottom: 0.2rem; }

  /* GAME */
  #game { padding: 1.2rem; align-items: center; gap: 1rem; }
  .game-header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
  .game-logo {
    font-family: 'Boogaloo', cursive; font-size: 1.4rem;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .round-badge { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; padding: 0.3rem 0.9rem; font-size: 0.8rem; font-weight: 800; color: var(--muted); }

  .scoreboard { width: 100%; display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.3rem; }
  .score-card { flex-shrink: 0; background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 0.6rem 0.9rem; text-align: center; min-width: 70px; transition: all 0.3s; }
  .score-card.winner-glow { border-color: var(--yellow); box-shadow: 0 0 20px rgba(251,191,36,0.3); }
  .score-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; color: white; margin: 0 auto 0.3rem; }
  .score-name { font-size: 0.7rem; font-weight: 700; color: var(--muted); }
  .score-pts { font-family: 'Boogaloo', cursive; font-size: 1.4rem; color: var(--text); line-height: 1; }

  .wheel-container { position: relative; width: 300px; height: 300px; flex-shrink: 0; }
  .wheel-pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 2rem; z-index: 10; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
  canvas#wheel { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 60px rgba(147,51,234,0.4), 0 0 120px rgba(236,72,153,0.2); }

  .spin-btn {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none; border-radius: 50px; padding: 1rem 2.5rem;
    font-family: 'Nunito', sans-serif; font-size: 1.3rem; font-weight: 900;
    color: white; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(147,51,234,0.5); transition: all 0.2s; width: 100%;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* PLAYING */
  #playing { padding: 1.5rem; align-items: center; justify-content: center; gap: 1rem; text-align: center; }

  .category-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px; padding: 0.4rem 1.2rem; font-size: 0.85rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  }

  /* Mystery animation while playing */
  .mystery-wrap {
    position: relative; width: 220px; height: 220px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .mystery-rays {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(
      rgba(147,51,234,0.3) 0deg, transparent 20deg,
      rgba(236,72,153,0.3) 40deg, transparent 60deg,
      rgba(34,211,238,0.3) 80deg, transparent 100deg,
      rgba(251,191,36,0.3) 120deg, transparent 140deg,
      rgba(147,51,234,0.3) 160deg, transparent 180deg,
      rgba(236,72,153,0.3) 200deg, transparent 220deg,
      rgba(34,211,238,0.3) 240deg, transparent 260deg,
      rgba(251,191,36,0.3) 280deg, transparent 300deg,
      rgba(147,51,234,0.3) 320deg, transparent 340deg,
      rgba(236,72,153,0.3) 360deg
    );
    animation: spinRays 3s linear infinite;
    opacity: 0.7;
  }
  @keyframes spinRays { to { transform: rotate(360deg); } }

  .disco-ball {
    position: relative; z-index: 2;
    width: 130px; height: 130px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffffff, #b0b0c0 30%, #606080 60%, #202030);
    box-shadow: 0 0 30px rgba(147,51,234,0.8), 0 0 60px rgba(236,72,153,0.4), inset -8px -8px 20px rgba(0,0,0,0.5);
    animation: spinDisco 2s linear infinite;
    overflow: hidden;
  }
  .disco-ball::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(0,0,0,0.15) 8px, rgba(0,0,0,0.15) 9px),
    repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(0,0,0,0.15) 8px, rgba(0,0,0,0.15) 9px);
  }
  .disco-ball::after {
    content: ''; position: absolute; top: 15%; left: 20%; width: 30%; height: 20%;
    background: rgba(255,255,255,0.6); border-radius: 50%; filter: blur(4px);
  }
  @keyframes spinDisco { to { transform: rotateY(360deg); } }

  .disco-light {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    animation: bounceDot 1.5s ease-in-out infinite;
  }
  .disco-light:nth-child(1) { background: #a855f7; top: 20%; left: 15%; animation-delay: 0s; }
  .disco-light:nth-child(2) { background: #ec4899; top: 60%; left: 80%; animation-delay: 0.3s; }
  .disco-light:nth-child(3) { background: #22d3ee; top: 75%; left: 20%; animation-delay: 0.6s; }
  .disco-light:nth-child(4) { background: #fbbf24; top: 25%; left: 70%; animation-delay: 0.9s; }
  .disco-light:nth-child(5) { background: #4ade80; top: 50%; left: 50%; animation-delay: 1.2s; }
  @keyframes bounceDot {
    0%, 100% { transform: translate(0,0) scale(1); opacity: 0.9; }
    50% { transform: translate(var(--dx,15px), var(--dy,-15px)) scale(1.5); opacity: 0.4; }
  }

  .sound-waves { display: flex; align-items: center; justify-content: center; gap: 4px; height: 40px; }
  .wave-bar {
    width: 5px; border-radius: 3px;
    background: linear-gradient(to top, var(--purple), var(--pink));
    animation: waveBounce 0.6s ease-in-out infinite alternate;
  }
  .wave-bar:nth-child(1) { height: 15px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 30px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 22px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 35px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 18px; animation-delay: 0.4s; }
  .wave-bar:nth-child(6) { height: 28px; animation-delay: 0.15s; }
  .wave-bar:nth-child(7) { height: 12px; animation-delay: 0.25s; }
  @keyframes waveBounce {
    from { transform: scaleY(0.4); opacity: 0.6; }
    to { transform: scaleY(1); opacity: 1; }
  }

  /* Timer ring */
  .timer-section {
    display: flex; align-items: center; gap: 1.2rem;
    margin: 0.2rem 0;
  }
  .timer-ring { width: 72px; height: 72px; position: relative; flex-shrink: 0; }
  .timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .timer-ring .ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
  .timer-ring .ring-progress {
    fill: none; stroke: var(--purple); stroke-width: 4;
    stroke-linecap: round; transition: stroke-dashoffset 0.4s linear, stroke 0.3s;
  }
  .timer-ring .ring-progress.warning { stroke: var(--yellow); }
  .timer-ring .ring-progress.danger { stroke: #ef4444; }
  .timer-value {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Boogaloo', cursive; font-size: 1.6rem; color: var(--text);
  }
  .timer-value.warning { color: var(--yellow); }
  .timer-value.danger { color: #ef4444; }

  .pause-btn {
    width: 52px; height: 52px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: var(--text); font-size: 1.4rem;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pause-btn:hover { border-color: var(--purple); background: rgba(147,51,234,0.1); }
  .pause-btn.paused { border-color: var(--green); background: rgba(74,222,128,0.1); }

  /* Spotify embed - hidden during play, revealed after */
  .embed-container {
    width: 100%; max-width: 360px;
    border-radius: 14px; overflow: hidden;
    transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
    transform: scale(0.9); opacity: 0; height: 0;
    pointer-events: none;
  }
  .embed-container.visible {
    transform: scale(1); opacity: 1; height: 152px;
    pointer-events: auto;
  }

  /* Song reveal card */
  .song-reveal {
    background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 1.2rem 1.5rem; width: 100%; max-width: 360px; text-align: center;
  }
  .song-reveal.hidden { display: none; }
  .reveal-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: var(--muted); margin-bottom: 0.6rem; text-transform: uppercase; }
  .song-name { font-family: 'Boogaloo', cursive; font-size: 1.8rem; color: var(--text); line-height: 1.1; margin-bottom: 0.3rem; }
  .artist-name { font-size: 1rem; font-weight: 700; color: var(--pink); }

  .reveal-btn {
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    border: none; border-radius: 50px; padding: 0.9rem 2rem;
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 900;
    color: #0a0a0f; cursor: pointer; box-shadow: 0 6px 25px rgba(251,191,36,0.4);
    transition: all 0.2s; width: 100%; max-width: 360px;
  }
  .reveal-btn:hover { transform: translateY(-2px); }

  .point-btns { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; max-width: 380px; }
  .point-player-row {
    background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
    padding: 0.6rem 0.8rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .point-player-name { flex: 1; font-size: 0.9rem; font-weight: 700; color: var(--text); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .point-actions { display: flex; gap: 0.35rem; flex-shrink: 0; }
  .pa-btn {
    border: none; border-radius: 8px; padding: 0.35rem 0.55rem;
    font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 900;
    cursor: pointer; transition: all 0.15s; min-width: 38px;
  }
  .pa-btn.plus { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .pa-btn.plus:hover { background: rgba(74,222,128,0.3); }
  .pa-btn.plus.active { background: #4ade80; color: #0a0a0f; }
  .pa-btn.minus { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
  .pa-btn.minus:hover { background: rgba(239,68,68,0.25); }
  .pa-btn.minus.active { background: #ef4444; color: white; }
  .point-score-badge {
    min-width: 32px; text-align: center;
    font-family: 'Boogaloo', cursive; font-size: 1.1rem; color: var(--yellow);
  }

  .next-btn {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px; padding: 0.7rem 2rem;
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
    color: var(--muted); cursor: pointer; transition: all 0.2s; width: 100%; max-width: 360px;
  }
  .next-btn:hover { border-color: var(--purple); color: var(--text); }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--card); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px;
    padding: 0.8rem 1.5rem; font-size: 0.9rem; font-weight: 700;
    z-index: 100; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(10,10,15,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1rem; z-index: 200;
  }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 48px; height: 48px; border: 3px solid rgba(147,51,234,0.2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 1rem; font-weight: 700; color: var(--muted); }

  /* WINNER */
  #winner { align-items: center; justify-content: center; padding: 2rem; text-align: center; gap: 1.2rem; }
  .confetti-wrap { font-size: 3rem; animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes bounceIn { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }
  .winner-name { font-family: 'Boogaloo', cursive; font-size: 3rem; background: linear-gradient(135deg, var(--yellow), var(--orange), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .winner-pts { font-size: 1.1rem; color: var(--muted); font-weight: 700; }
  .final-scores { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 0.5rem; }
  .final-row { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 1rem; }
  .final-row.top { border-color: var(--yellow); background: rgba(251,191,36,0.06); }
  .rank { font-family: 'Boogaloo', cursive; font-size: 1.3rem; color: var(--muted); width: 28px; }
  .final-name { flex: 1; font-weight: 700; }
  .final-pts { font-family: 'Boogaloo', cursive; font-size: 1.4rem; color: var(--yellow); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="notes-bg" id="notesBg"></div>
<div class="loading-overlay hidden" id="loadingOverlay">

<!-- ========== HOME ========== -->
<div class="screen active" id="home">
  <div class="logo-wrap">
    <div class="logo-icon">🎵</div>
    <div class="logo-text">RANDOMUSIK</div>
    <div class="logo-sub">Party Music Game</div>
  </div>
  <p class="tagline">Gira la ruleta, suena la canción, ¡adivina y gana!</p>

  <div class="spotify-status" style="margin-bottom:0.5rem">
    <div class="status-dot"></div>
    <span>Powered by Spotify · Partidas ilimitadas</span>
  </div>

  <button class="btn-primary" onclick="goTo('setup')">🎲 Crear Partida</button>
</div>

<!-- ========== SETUP ========== -->
<div class="screen" id="setup">
  <div class="screen-header">
    <button class="back-btn" onclick="goTo('home')">←</button>
    <div class="screen-title">Configurar Partida</div>
  </div>
  <div>
    <div class="section-label">👥 Jugadores</div>
    <div class="players-list" id="playersList"></div>
    <button class="add-player-btn" onclick="addPlayer()">+ Añadir jugador</button>
  </div>
  <div>
    <div class="section-label">🎛️ Categorías de la Ruleta</div>
    <div class="categories-grid" id="catsGrid"></div>
  </div>
  <div>
    <div class="section-label">⚡ Dificultad</div>
    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy" onclick="setDiff(this)"><span class="diff-emoji">😄</span>Fácil</button>
      <button class="diff-btn" data-diff="normal" onclick="setDiff(this)"><span class="diff-emoji">🤔</span>Normal</button>
      <button class="diff-btn" data-diff="hard" onclick="setDiff(this)"><span class="diff-emoji">🔥</span>Difícil</button>
    </div>
  </div>
  <button class="btn-primary" onclick="startGame()" style="margin-top:auto">🎰 ¡Jugar!</button>
</div>

<!-- ========== GAME (WHEEL) ========== -->
<div class="screen" id="game">
  <div class="game-header" style="width:100%">
    <div class="game-logo">🎵 Randomusik</div>
    <div class="round-badge">Ronda <span id="roundNum">1</span></div>
  </div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="wheel-container">
    <div class="wheel-pointer">▼</div>
    <canvas id="wheel" width="300" height="300"></canvas>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎲 ¡GIRAR!</button>
</div>

<!-- ========== PLAYING ========== -->
<div class="screen" id="playing">
  <div class="category-tag" id="playingCat">🎸 Rock Clásico</div>

  <!-- Mystery animation -->
  <div class="mystery-wrap" id="mysteryWrap">
    <div class="mystery-rays"></div>
    <div class="disco-light" style="--dx:20px;--dy:-20px"></div>
    <div class="disco-light" style="--dx:-15px;--dy:18px"></div>
    <div class="disco-light" style="--dx:18px;--dy:15px"></div>
    <div class="disco-light" style="--dx:-20px;--dy:-12px"></div>
    <div class="disco-light" style="--dx:10px;--dy:20px"></div>
    <div class="disco-ball"></div>
  </div>

  <!-- Sound waves -->
  <div class="sound-waves" id="soundWaves">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>

  <!-- Timer + Pause -->
  <div class="timer-section" id="timerSection">
    <div class="timer-ring">
      <svg viewBox="0 0 42 42">
        <circle class="ring-bg" cx="21" cy="21" r="18.5"/>
        <circle class="ring-progress" id="timerCircle" cx="21" cy="21" r="18.5"
          stroke-dasharray="116.24" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-value" id="timerValue">30</div>
    </div>
    <button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>
  </div>

  <!-- Spotify Embed (hidden during play, revealed after) -->
  <div class="embed-container" id="embedContainer">
    <div id="embed-iframe"></div>
  </div>

  <div class="song-reveal hidden" id="songReveal">
    <div class="reveal-label">La canción es...</div>
    <div class="song-info">
      <div class="song-name" id="songName">–</div>
      <div class="artist-name" id="artistName">–</div>
    </div>
  </div>

  <button class="reveal-btn" id="revealBtn" onclick="revealSong()">👁️ Revelar Canción</button>
  <div class="point-btns hidden" id="pointBtns"></div>
  <button class="next-btn hidden" id="nextBtn" onclick="nextRound()">Siguiente ronda →</button>
</div>

<!-- ========== WINNER ========== -->
<div class="screen" id="winner">
  <div class="confetti-wrap">🏆</div>
  <div style="font-size:1.1rem;color:var(--muted);font-weight:700">¡Tenemos ganador!</div>
  <div class="winner-name" id="winnerName">–</div>
  <div class="winner-pts" id="winnerPts">0 puntos</div>
  <div class="final-scores" id="finalScores"></div>
  <button class="btn-primary" onclick="resetGame()" style="margin-top:0.5rem">🔄 Jugar de nuevo</button>
</div>

    console.log('[Randomusik] Spotify Embed ready');
  });
};

function playTrack(uri) {
  if (!embedController) { console.warn('Embed not ready'); return; }
  embedController.loadUri(uri);
  setTimeout(() => embedController.play(), 600);
}

function stopPlayback() {
  if (embedController) { try { embedController.pause(); } catch(e) {} }
}

// ========== TIMER ==========
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = ROUND_SECONDS;
  isPaused = false;
  updateTimerUI();
  document.getElementById('pauseBtn').textContent = '⏸';
  document.getElementById('pauseBtn').classList.remove('paused');

  timerInterval = setInterval(() => {
    if (isPaused) return;
    timeLeft--;
    if (timeLeft <= 0) {
      timeLeft = 0;
      clearInterval(timerInterval);
      // Auto-reveal when time runs out
      if (!document.getElementById('songReveal').classList.contains('hidden')) return; // already revealed
      revealSong();
    }
    updateTimerUI();
  }, 1000);
}

function updateTimerUI() {
  const circle = document.getElementById('timerCircle');
  const display = document.getElementById('timerValue');
  const circumference = 2 * Math.PI * 18.5; // 116.24
  const progress = timeLeft / ROUND_SECONDS;
  circle.style.strokeDashoffset = circumference * (1 - progress);

  circle.classList.remove('warning', 'danger');
  display.classList.remove('warning', 'danger');
  if (timeLeft <= 5) { circle.classList.add('danger'); display.classList.add('danger'); }
  else if (timeLeft <= 10) { circle.classList.add('warning'); display.classList.add('warning'); }

  display.textContent = timeLeft;
}

function togglePause() {
  const btn = document.getElementById('pauseBtn');
  const waves = document.getElementById('soundWaves');
  if (isPaused) {
    isPaused = false;
    btn.textContent = '⏸';
    btn.classList.remove('paused');
    waves.style.animationPlayState = '';
    document.querySelectorAll('.wave-bar').forEach(b => b.style.animationPlayState = 'running');
    document.querySelectorAll('.disco-ball, .mystery-rays').forEach(el => el.style.animationPlayState = 'running');
    if (embedController) { try { embedController.play(); } catch(e) {} }
  } else {
    isPaused = true;
    btn.textContent = '▶';
    btn.classList.add('paused');
    document.querySelectorAll('.wave-bar').forEach(b => b.style.animationPlayState = 'paused');
    document.querySelectorAll('.disco-ball, .mystery-rays').forEach(el => el.style.animationPlayState = 'paused');
    if (embedController) { try { embedController.pause(); } catch(e) {} }
  }
}

// ========== TRACK SELECTION ==========
function getTrackFromCatalog(cat) {
  const catData = SONG_CATALOG[cat.name];
  if (!catData) return null;
  let pool = catData[difficulty] || [];
  if (!pool.length) pool = catData["normal"] || [];
  if (!pool.length) pool = catData["easy"] || [];
  if (!pool.length) return null;

  const available = pool.filter(t => !usedTrackIds.has(t.uri));
  const finalPool = available.length > 0 ? available : pool;
  const noRepeat = finalPool.filter(t => t.artist !== lastArtistName);
  const candidates = noRepeat.length > 0 ? noRepeat : finalPool;

  const track = candidates[Math.floor(Math.random() * candidates.length)];
  usedTrackIds.add(track.uri);
  lastArtistName = track.artist;
  return track;
}

// ========== NAVIGATION ==========
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);

  if (id === 'game') {
    renderScoreboard();
    document.getElementById('roundNum').textContent = round;
  }
}

// ========== FLOATING NOTES ==========
function spawnNotes() {
  const container = document.getElementById('notesBg');
  const notes = ['♪','♫','♬','♩','🎵','🎶'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'note';
    el.textContent = notes[i % notes.length];
    el.style.left = Math.random() * 100 + '%';
    el.style.top = (30 + Math.random() * 60) + '%';
    el.style.animationDelay = (Math.random() * 8) + 's';
    el.style.fontSize = (1 + Math.random()) + 'rem';
    container.appendChild(el);
  }
}

// ========== TOAST ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showLoading(msg) { document.getElementById('loadingText').textContent = msg || 'Cargando...'; document.getElementById('loadingOverlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

// ========== PLAYERS ==========
function renderPlayers() {
  const list = document.getElementById('playersList');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <div class="player-avatar" style="background:${AVATAR_COLORS[p.avatar % AVATAR_COLORS.length]}">${AVATARS[p.avatar % AVATARS.length]}</div>
      <input class="player-name-input" value="${p.name}" placeholder="Nombre" maxlength="15" oninput="players[${i}].name=this.value" onfocus="this.select()">
      ${players.length > 1 ? `<button class="remove-player" onclick="removePlayer(${i})">✕</button>` : ''}
    `;
    list.appendChild(row);
  });
}

function addPlayer() {
  if (players.length >= 8) { showToast('Máximo 8 jugadores'); return; }
  players.push({ name: `Jugador ${players.length + 1}`, avatar: players.length });
  renderPlayers();
}

function removePlayer(i) {
  players.splice(i, 1);
  renderPlayers();
}

// ========== CATEGORIES ==========
function renderCats() {
  const grid = document.getElementById('catsGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach((cat, i) => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (selectedCats.includes(i) ? ' selected' : '');
    chip.style.color = selectedCats.includes(i) ? cat.color : '';
    chip.innerHTML = `${cat.emoji} ${cat.name} <span class="cat-check">✓</span>`;
    chip.onclick = () => toggleCat(i, chip, cat);
    grid.appendChild(chip);
  });
}

function toggleCat(i, chip, cat) {
  const idx = selectedCats.indexOf(i);
  if (idx >= 0) { selectedCats.splice(idx, 1); chip.classList.remove('selected'); chip.style.color = ''; }
  else { selectedCats.push(i); chip.classList.add('selected'); chip.style.color = cat.color; }
}

function setDiff(btn) {
  difficulty = btn.dataset.diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ========== WHEEL ==========
let wheelAngle = 0;
let wheelSegments = [];

function buildWheel() {
  wheelSegments = selectedCats.map(i => CATEGORIES[i]);
  drawWheel(wheelAngle);
}

function drawWheel(angle) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = 150, cy = 150, r = 145;
  const n = wheelSegments.length;
  const arc = (2 * Math.PI) / n;
  ctx.clearRect(0, 0, 300, 300);
  ctx.save();
  ctx.shadowBlur = 30;
  ctx.shadowColor = 'rgba(147,51,234,0.5)';
  wheelSegments.forEach((seg, i) => {
    const start = angle + i * arc - Math.PI / 2;
    const end = start + arc;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end); ctx.closePath();
    ctx.fillStyle = seg.color + 'cc'; ctx.fill();
    ctx.strokeStyle = '#0a0a0f'; ctx.lineWidth = 2; ctx.stroke();
  });
  ctx.restore();
  // Center
  ctx.beginPath(); ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
  grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#0a0a0f');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🎵', cx, cy);
  // Labels
  wheelSegments.forEach((seg, i) => {
    const mid = angle + i * arc - Math.PI / 2 + arc / 2;
    const lx = cx + r * 0.62 * Math.cos(mid);
    const ly = cy + r * 0.62 * Math.sin(mid);
    ctx.save(); ctx.translate(lx, ly); ctx.rotate(mid + Math.PI / 2);
    ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
    const words = seg.name.split(' ');
    if (words.length > 1 && seg.name.length > 10) {
      ctx.font = 'bold 10px Nunito,sans-serif'; ctx.fillText(seg.emoji, 0, -9);
      ctx.font = 'bold 9px Nunito,sans-serif'; ctx.fillText(words[0], 0, 2);
      ctx.fillText(words.slice(1).join(' '), 0, 12);
    } else {
      ctx.font = 'bold 10px Nunito,sans-serif'; ctx.fillText(seg.emoji, 0, -7);
      ctx.font = 'bold 9px Nunito,sans-serif'; ctx.fillText(seg.name, 0, 5);
    }
    ctx.restore();
  });
}

function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const n = wheelSegments.length;
  const arc = (2 * Math.PI) / n;
  const winningIdx = Math.floor(Math.random() * n);
  const desiredAngle = ((-winningIdx * arc - arc / 2) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const currentNorm = ((wheelAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  let delta = desiredAngle - currentNorm;
  if (delta <= 0.01) delta += 2 * Math.PI;
  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const targetAngle = wheelAngle + delta + extraSpins;

  const duration = 3500 + Math.random() * 1000;
  const startAngle = wheelAngle;
  const startTime = performance.now();
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }
  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    wheelAngle = startAngle + (targetAngle - startAngle) * easeOut(progress);
    drawWheel(wheelAngle);
    if (progress < 1) { requestAnimationFrame(animate); }
    else { wheelAngle = desiredAngle; drawWheel(wheelAngle); onSpinEnd(winningIdx); }
  }
  requestAnimationFrame(animate);
}

function onSpinEnd(winningIdx) {
  currentCat = wheelSegments[winningIdx];
  showLoading(`${currentCat.emoji} ${currentCat.name}`);

  const track = getTrackFromCatalog(currentCat);
  if (!track) { hideLoading(); showToast('No se encontró canción'); spinning = false; document.getElementById('spinBtn').disabled = false; return; }

  currentSong = track;
  loadPlayingScreen(track, currentCat);

  // Start Spotify playback
  playTrack(track.uri);

  // Small delay to let embed load, then show playing screen + start timer
  setTimeout(() => {
    hideLoading();
    goTo('playing');
    startTimer();
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
  }, 800);
}

// ========== PLAYING SCREEN ==========
function loadPlayingScreen(track, cat) {
  // Reset state
  document.getElementById('mysteryWrap').style.display = '';
  document.getElementById('soundWaves').style.display = '';
  document.getElementById('songReveal').classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');
  document.getElementById('pointBtns').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('nextBtn').textContent = 'Siguiente ronda →';
  document.getElementById('nextBtn').onclick = nextRound;
  document.getElementById('embedContainer').classList.remove('visible');
  document.getElementById('timerSection').style.display = '';
  // Reset animation states from potential pause
  document.querySelectorAll('.wave-bar').forEach(b => b.style.animationPlayState = 'running');
  document.querySelectorAll('.disco-ball, .mystery-rays').forEach(el => el.style.animationPlayState = 'running');

  // Category tag
  const tag = document.getElementById('playingCat');
  tag.textContent = cat.emoji + ' ' + cat.name;
  tag.style.color = cat.color;
  tag.style.borderColor = cat.color + '40';

  // Song info
  document.getElementById('songName').textContent = track.name;
  document.getElementById('artistName').textContent = track.artist || '';
}

function revealSong() {
  // Stop timer
  clearInterval(timerInterval);
  isPaused = false;

  // Hide mystery, show song info
  document.getElementById('mysteryWrap').style.display = 'none';
  document.getElementById('soundWaves').style.display = 'none';
  document.getElementById('timerSection').style.display = 'none';
  document.getElementById('songReveal').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('pointBtns').classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');

  // Show the Spotify embed (now reveals the track visually)
  document.getElementById('embedContainer').classList.add('visible');

  renderPointBtns();
}

// ========== SCORING ==========
function renderPointBtns() {
  roundDeltas = {};
  players.forEach(p => { roundDeltas[p.name] = { song: 0, artist: 0, penalty: 0 }; });

  const div = document.getElementById('pointBtns');
  div.innerHTML = '<div style="font-size:0.7rem;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:0.4rem">¿Quién adivinó?</div>';

  players.forEach(p => {
    const row = document.createElement('div');
    row.className = 'point-player-row';
    row.innerHTML = `
      <div class="point-player-name">${AVATARS[p.avatar % AVATARS.length]} ${p.name}</div>
      <div class="point-actions">
        <button class="pa-btn plus" onclick="toggleDelta('${esc(p.name)}','song',this)">🎵+1</button>
        <button class="pa-btn plus" onclick="toggleDelta('${esc(p.name)}','artist',this)">🎤+1</button>
        <button class="pa-btn minus" onclick="toggleDelta('${esc(p.name)}','penalty',this)">❌-1</button>
      </div>
      <div class="point-score-badge" id="badge-${esc(p.name)}">${scores[p.name] || 0}</div>
    `;
    div.appendChild(row);
  });
}

function esc(s) { return s.replace(/'/g, "\\'"); }

function toggleDelta(playerName, type, btn) {
  const d = roundDeltas[playerName];
  if (type === 'penalty') {
    if (d.penalty === 0) { d.penalty = -1; btn.textContent = '❌-1'; btn.classList.add('active'); }
    else if (d.penalty === -1) { d.penalty = -2; btn.textContent = '❌-2'; }
    else { d.penalty = 0; btn.textContent = '❌-1'; btn.classList.remove('active'); }
  } else {
    if (btn.classList.contains('active')) { d[type] = 0; btn.classList.remove('active'); }
    else { d[type] = 1; btn.classList.add('active'); }
  }

  const net = d.song + d.artist + d.penalty;
  const badge = document.getElementById(`badge-${playerName}`);
  const base = scores[playerName] || 0;
  const preview = Math.max(0, base + net);
  badge.textContent = net !== 0 ? `${base} → ${preview}` : base;
  badge.style.color = net > 0 ? '#4ade80' : net < 0 ? '#f87171' : 'var(--yellow)';

  renderScoreboard();
  checkWinCondition();
}

function applyRoundScores() {
  players.forEach(p => {
    const d = roundDeltas[p.name] || { song: 0, artist: 0, penalty: 0 };
    const net = d.song + d.artist + d.penalty;
    scores[p.name] = Math.max(0, (scores[p.name] || 0) + net);
  });
}

function checkWinCondition() {
  if (round >= MAX_ROUNDS || Object.values(scores).some(s => s >= 10)) {
    document.getElementById('nextBtn').textContent = '🏆 Ver Ganador';
    document.getElementById('nextBtn').onclick = () => { applyRoundScores(); showWinner(); };
  } else {
    document.getElementById('nextBtn').textContent = 'Siguiente ronda →';
    document.getElementById('nextBtn').onclick = nextRound;
  }
}

function nextRound() {
  applyRoundScores();
  stopPlayback();
  clearInterval(timerInterval);
  round++;
  document.getElementById('roundNum').textContent = round;
  goTo('game');
}

// ========== SCOREBOARD ==========
function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  const maxPts = Math.max(0, ...Object.values(scores));
  players.forEach(p => {
    const pts = scores[p.name] || 0;
    const card = document.createElement('div');
    card.className = 'score-card' + (pts === maxPts && pts > 0 ? ' winner-glow' : '');
    card.innerHTML = `
      <div class="score-avatar" style="background:${AVATAR_COLORS[p.avatar % AVATAR_COLORS.length]}">${AVATARS[p.avatar % AVATARS.length]}</div>
      <div class="score-name">${p.name}</div>
      <div class="score-pts">${pts}</div>
    `;
    sb.appendChild(card);
  });
}

// ========== WINNER ==========
function showWinner() {
  stopPlayback();
  clearInterval(timerInterval);
  const sorted = players.map(p => ({ ...p, pts: scores[p.name] || 0 })).sort((a, b) => b.pts - a.pts);
  const w = sorted[0];
  document.getElementById('winnerName').textContent = w.name;
  document.getElementById('winnerPts').textContent = `${w.pts} punto${w.pts !== 1 ? 's' : ''}`;
  const fs = document.getElementById('finalScores');
  fs.innerHTML = '';
  ['🥇','🥈','🥉'].forEach((medal, i) => {
    if (!sorted[i]) return;
    const row = document.createElement('div');
    row.className = 'final-row' + (i === 0 ? ' top' : '');
    row.innerHTML = `<div class="rank">${medal}</div><div class="final-name">${AVATARS[sorted[i].avatar % AVATARS.length]} ${sorted[i].name}</div><div class="final-pts">${sorted[i].pts} pts</div>`;
    fs.appendChild(row);
  });
  goTo('winner');
}

function resetGame() {
  scores = {}; round = 1;
  clearInterval(timerInterval);
  players.forEach(p => scores[p.name] = 0);
  usedTrackIds.clear();
  lastArtistName = null;
  goTo('home');
}

function startGame() {
  if (selectedCats.length < 3) { showToast('Selecciona al menos 3 categorías'); return; }
  scores = {}; round = 1;
  usedTrackIds.clear();
  lastArtistName = null;
  players.forEach(p => scores[p.name] = 0);
  buildWheel();
  renderScoreboard();
  goTo('game');
}

// ========== INIT ==========
spawnNotes();
renderPlayers();
renderCats();
</script>
</body>
</html>
