<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randomusik</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131f;
    --purple: #9333ea;
    --pink: #ec4899;
    --yellow: #fbbf24;
    --cyan: #22d3ee;
    --green: #4ade80;
    --orange: #fb923c;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --spotify: #1ed760;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(147,51,234,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(236,72,153,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 60% 10%, rgba(34,211,238,0.1) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* FLOATING NOTES */
  .notes-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .note {
    position: absolute; font-size: 1.5rem; opacity: 0;
    animation: floatNote 8s ease-in-out infinite;
  }
  @keyframes floatNote {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    20% { opacity: 0.15; } 80% { opacity: 0.1; }
    100% { opacity: 0; transform: translateY(-120px) rotate(20deg); }
  }

  /* HOME */
  #home { align-items: center; justify-content: center; padding: 2rem; text-align: center; gap: 1.5rem; }

  .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

  .logo-icon { font-size: 5rem; filter: drop-shadow(0 0 30px rgba(147,51,234,0.8)); animation: pulseGlow 2s ease-in-out infinite; }
  @keyframes pulseGlow {
    0%,100% { filter: drop-shadow(0 0 30px rgba(147,51,234,0.8)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 50px rgba(236,72,153,0.9)); transform: scale(1.05); }
  }

  .logo-text {
    font-family: 'Boogaloo', cursive; font-size: 3.5rem; letter-spacing: 2px; line-height: 1;
    background: linear-gradient(135deg, var(--purple), var(--pink), var(--yellow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo-sub { font-size: 1rem; color: var(--muted); font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }
  .tagline { font-size: 1.1rem; color: var(--muted); max-width: 280px; line-height: 1.5; animation: fadeUp 0.6s 0.3s both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Spotify connect button */
  .btn-spotify {
    background: var(--spotify);
    border: none; border-radius: 50px;
    padding: 1rem 2.2rem;
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 900;
    color: #000; cursor: pointer; letter-spacing: 0.5px;
    box-shadow: 0 8px 30px rgba(30,215,96,0.4);
    transition: all 0.2s; display: flex; align-items: center; gap: 0.6rem;
    animation: fadeUp 0.6s 0.5s both;
  }
  .btn-spotify:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(30,215,96,0.6); }
  .btn-spotify:active { transform: scale(0.97); }
  .btn-spotify svg { width: 22px; height: 22px; }

  .btn-primary {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none; border-radius: 50px; padding: 1rem 2.5rem;
    font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 900;
    color: white; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(147,51,234,0.5); transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(147,51,234,0.7); }
  .btn-primary:active { transform: scale(0.97); }

  /* Spotify status */
  .spotify-status {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 1.2rem;
    border-radius: 50px; font-size: 0.85rem; font-weight: 700;
    animation: fadeUp 0.6s 0.7s both;
  }
  .spotify-status.connected { background: rgba(30,215,96,0.1); border: 1px solid rgba(30,215,96,0.3); color: var(--spotify); }
  .spotify-status.disconnected { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .connected .status-dot { background: var(--spotify); animation: pulseGlow 1.5s infinite; }
  .disconnected .status-dot { background: var(--muted); }

  /* SETUP */
  #setup { padding: 1.5rem; gap: 1.2rem; }

  .screen-header { display: flex; align-items: center; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .back-btn {
    background: rgba(255,255,255,0.08); border: none; border-radius: 50%;
    width: 40px; height: 40px; cursor: pointer; color: white; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.15); }
  .screen-title {
    font-family: 'Boogaloo', cursive; font-size: 1.8rem;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .section-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--purple); margin-bottom: 0.6rem; }

  .players-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .player-row {
    display: flex; align-items: center; gap: 0.8rem;
    background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 0.7rem 1rem;
  }
  .player-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; color: white; flex-shrink: 0; }
  .player-name-input { background: transparent; border: none; outline: none; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; flex: 1; }
  .player-name-input::placeholder { color: var(--muted); }
  .remove-player { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0 0.2rem; transition: color 0.2s; }
  .remove-player:hover { color: var(--pink); }
  .add-player-btn {
    background: transparent; border: 2px dashed rgba(255,255,255,0.15); border-radius: 14px;
    padding: 0.7rem; color: var(--muted); cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700; transition: all 0.2s; width: 100%;
  }
  .add-player-btn:hover { border-color: var(--purple); color: var(--purple); }

  .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
  .cat-chip {
    background: var(--card); border: 2px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 0.7rem 0.8rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-weight: 700; color: var(--muted);
  }
  .cat-chip.selected { border-color: currentColor; color: white; background: rgba(255,255,255,0.05); }
  .cat-chip.selected .cat-check { opacity: 1; }
  .cat-check { margin-left: auto; opacity: 0; transition: opacity 0.2s; font-size: 0.9rem; }

  .diff-row { display: flex; gap: 0.6rem; }
  .diff-btn {
    flex: 1; background: var(--card); border: 2px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 0.8rem 0.5rem; cursor: pointer; font-family: 'Nunito', sans-serif;
    font-size: 0.85rem; font-weight: 800; color: var(--muted); text-align: center; transition: all 0.2s;
  }
  .diff-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,0.08); }
  .diff-emoji { font-size: 1.3rem; display: block; margin-bottom: 0.2rem; }

  /* GAME */
  #game { padding: 1.2rem; align-items: center; gap: 1rem; }
  .game-header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
  .game-logo {
    font-family: 'Boogaloo', cursive; font-size: 1.4rem;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .round-badge { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; padding: 0.3rem 0.9rem; font-size: 0.8rem; font-weight: 800; color: var(--muted); }

  .scoreboard { width: 100%; display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.3rem; }
  .score-card { flex-shrink: 0; background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 0.6rem 0.9rem; text-align: center; min-width: 70px; transition: all 0.3s; }
  .score-card.winner-glow { border-color: var(--yellow); box-shadow: 0 0 20px rgba(251,191,36,0.3); }
  .score-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; color: white; margin: 0 auto 0.3rem; }
  .score-name { font-size: 0.7rem; font-weight: 700; color: var(--muted); }
  .score-pts { font-family: 'Boogaloo', cursive; font-size: 1.4rem; color: var(--text); line-height: 1; }

  .wheel-container { position: relative; width: 300px; height: 300px; flex-shrink: 0; }
  .wheel-pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 2rem; z-index: 10; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
  canvas#wheel { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 60px rgba(147,51,234,0.4), 0 0 120px rgba(236,72,153,0.2); }

  .spin-btn {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none; border-radius: 50px; padding: 1rem 2.5rem;
    font-family: 'Nunito', sans-serif; font-size: 1.3rem; font-weight: 900;
    color: white; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(147,51,234,0.5); transition: all 0.2s; width: 100%;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* PLAYING */
  #playing { padding: 1.5rem; align-items: center; justify-content: center; gap: 1rem; text-align: center; }

  .category-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px; padding: 0.4rem 1.2rem; font-size: 0.85rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  }

  /* Album art / music visual */
  .album-wrap {
    position: relative; width: 200px; height: 200px; flex-shrink: 0;
  }
  .album-wrap::before {
    content: ''; position: absolute; inset: -10px; border-radius: 50%;
    border: 2px solid var(--purple); opacity: 0;
    animation: sonarPulse 1.8s ease-out infinite;
  }
  .album-wrap::after {
    content: ''; position: absolute; inset: -22px; border-radius: 50%;
    border: 2px solid var(--pink); opacity: 0;
    animation: sonarPulse 1.8s 0.6s ease-out infinite;
  }
  @keyframes sonarPulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.2); opacity: 0; } }
  .album-art {
    width: 200px; height: 200px; border-radius: 16px;
    object-fit: cover; display: block;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .album-placeholder {
    width: 200px; height: 200px; border-radius: 16px;
    background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center; font-size: 5rem;
    animation: spinSlow 8s linear infinite;
  }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Progress bar */
  .progress-bar-wrap { width: 100%; max-width: 300px; }
  .progress-bar-bg { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 2px; width: 0%; transition: width 0.5s linear; }
  .progress-time { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); font-weight: 700; margin-top: 0.3rem; }

  .song-reveal {
    background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 1.2rem 1.5rem; width: 100%; max-width: 360px; text-align: center;
  }
  .song-reveal.hidden .song-info { filter: blur(8px); user-select: none; }
  .reveal-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: var(--muted); margin-bottom: 0.6rem; text-transform: uppercase; }
  .song-name { font-family: 'Boogaloo', cursive; font-size: 1.8rem; color: var(--text); line-height: 1.1; margin-bottom: 0.3rem; }
  .artist-name { font-size: 1rem; font-weight: 700; color: var(--pink); }

  .reveal-btn {
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    border: none; border-radius: 50px; padding: 0.9rem 2rem;
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 900;
    color: #0a0a0f; cursor: pointer; box-shadow: 0 6px 25px rgba(251,191,36,0.4);
    transition: all 0.2s; width: 100%; max-width: 360px;
  }
  .reveal-btn:hover { transform: translateY(-2px); }

  .point-btns { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; max-width: 360px; }
  .point-btn {
    background: var(--card); border: 2px solid rgba(255,255,255,0.1); border-radius: 14px;
    padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
    color: var(--text); transition: all 0.2s;
  }
  .point-btn:hover:not(:disabled) { border-color: var(--green); background: rgba(74,222,128,0.07); }
  .point-btn:disabled { opacity: 0.6; }
  .point-badge { background: var(--green); color: #0a0a0f; border-radius: 50px; padding: 0.15rem 0.6rem; font-size: 0.8rem; font-weight: 900; }

  .next-btn {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px; padding: 0.7rem 2rem;
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
    color: var(--muted); cursor: pointer; transition: all 0.2s; width: 100%; max-width: 360px;
  }
  .next-btn:hover { border-color: var(--purple); color: var(--text); }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--card); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px;
    padding: 0.8rem 1.5rem; font-size: 0.9rem; font-weight: 700;
    z-index: 100; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Loading overlay */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(10,10,15,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1rem; z-index: 200;
  }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 48px; height: 48px; border: 3px solid rgba(147,51,234,0.2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 1rem; font-weight: 700; color: var(--muted); }

  /* WINNER */
  #winner { align-items: center; justify-content: center; padding: 2rem; text-align: center; gap: 1.2rem; }
  .confetti-wrap { font-size: 3rem; animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes bounceIn { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }
  .winner-name { font-family: 'Boogaloo', cursive; font-size: 3rem; background: linear-gradient(135deg, var(--yellow), var(--orange), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .winner-pts { font-size: 1.1rem; color: var(--muted); font-weight: 700; }
  .final-scores { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 0.5rem; }
  .final-row { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 1rem; }
  .final-row.top { border-color: var(--yellow); background: rgba(251,191,36,0.06); }
  .rank { font-family: 'Boogaloo', cursive; font-size: 1.3rem; color: var(--muted); width: 28px; }
  .final-name { flex: 1; font-weight: 700; }
  .final-pts { font-family: 'Boogaloo', cursive; font-size: 1.4rem; color: var(--yellow); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="notes-bg" id="notesBg"></div>
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Cargando...</div>
</div>
<div class="toast" id="toast"></div>

<!-- ========== HOME ========== -->
<div class="screen active" id="home">
  <div class="logo-wrap">
    <div class="logo-icon">🎵</div>
    <div class="logo-text">RANDOMUSIK</div>
    <div class="logo-sub">Party Music Game</div>
  </div>
  <p class="tagline">Gira la ruleta, suena la canción, ¡adivina y gana!</p>

  <button class="btn-spotify" id="spotifyBtn" onclick="connectSpotify()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    Conectar con Spotify
  </button>

  <div class="spotify-status disconnected" id="spotifyStatus">
    <div class="status-dot"></div>
    <span id="spotifyStatusText">No conectado</span>
  </div>

  <button class="btn-primary hidden" id="playBtn" onclick="goTo('setup')">🎲 Crear Partida</button>
</div>

<!-- ========== SETUP ========== -->
<div class="screen" id="setup">
  <div class="screen-header">
    <button class="back-btn" onclick="goTo('home')">←</button>
    <div class="screen-title">Configurar Partida</div>
  </div>
  <div>
    <div class="section-label">👥 Jugadores</div>
    <div class="players-list" id="playersList"></div>
    <button class="add-player-btn" onclick="addPlayer()">+ Añadir jugador</button>
  </div>
  <div>
    <div class="section-label">🎛️ Categorías de la Ruleta</div>
    <div class="categories-grid" id="catsGrid"></div>
  </div>
  <div>
    <div class="section-label">⚡ Dificultad</div>
    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy" onclick="setDiff(this)"><span class="diff-emoji">😄</span>Fácil</button>
      <button class="diff-btn" data-diff="normal" onclick="setDiff(this)"><span class="diff-emoji">🤔</span>Normal</button>
      <button class="diff-btn" data-diff="hard" onclick="setDiff(this)"><span class="diff-emoji">🔥</span>Difícil</button>
    </div>
  </div>
  <button class="btn-primary" onclick="startGame()" style="margin-top:auto">🎰 ¡Jugar!</button>
</div>

<!-- ========== GAME ========== -->
<div class="screen" id="game">
  <div class="game-header" style="width:100%">
    <div class="game-logo">🎵 Randomusik</div>
    <div class="round-badge">Ronda <span id="roundNum">1</span></div>
  </div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="wheel-container">
    <div class="wheel-pointer">▼</div>
    <canvas id="wheel" width="300" height="300"></canvas>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎲 ¡GIRAR!</button>
</div>

<!-- ========== PLAYING ========== -->
<div class="screen" id="playing">
  <div class="category-tag" id="playingCat">🎸 Rock Clásico</div>

  <div class="album-wrap" id="albumWrap">
    <div class="album-placeholder" id="albumPlaceholder">💿</div>
    <img class="album-art hidden" id="albumArt" alt="Album art">
  </div>

  <div class="progress-bar-wrap">

  'streaming',
  'user-read-email',
  'user-read-private',
  'user-read-playback-state',
  'user-modify-playback-state',

// ========== SPOTIFY AUTH (PKCE) ==========
async function generateCodeVerifier() {
  const array = new Uint8Array(64);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function connectSpotify() {
  const verifier = await generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: 'S256',
    code_challenge: challenge,
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function exchangeToken(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'authorization_code',
    code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier,
  });
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body,
  });
  const data = await res.json();
  if (data.access_token) {
    sessionStorage.setItem('spotify_token', data.access_token);
    sessionStorage.setItem('spotify_refresh', data.refresh_token || '');
    window.history.replaceState({}, '', '/');
    return data.access_token;
  }
  return null;
}

async function refreshToken() {
  const refresh = sessionStorage.getItem('spotify_refresh');
  if (!refresh) return null;
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'refresh_token',
    refresh_token: refresh,
  });
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body,
  });
  const data = await res.json();
  if (data.access_token) {
    sessionStorage.setItem('spotify_token', data.access_token);
    return data.access_token;
  }
  return null;
}

function getToken() { return sessionStorage.getItem('spotify_token'); }

async function spotifyFetch(url, options = {}) {
  let token = getToken();
  let res = await fetch(url, { ...options, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers } });
  if (res.status === 401) {
    token = await refreshToken();
    if (!token) { showToast('⚠️ Sesión expirada, reconecta Spotify'); return null; }
    res = await fetch(url, { ...options, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers } });
  }
  if (res.status === 204 || res.status === 202) return {};
  return res.json().catch(() => ({}));
}

let progressInterval = null;
let trackDuration = 0;

function onPlayerStateChanged(state) {
  if (!state) return;
  const track = state.track_window?.current_track;
  if (!track) return;
  trackDuration = state.duration;
  if (progressInterval) clearInterval(progressInterval);
  if (!state.paused) {
    let pos = state.position;
    progressInterval = setInterval(() => {
      pos += 500;
      updateProgress(pos, trackDuration);
      if (pos >= trackDuration) clearInterval(progressInterval);
    }, 500);
  }
  updateProgress(state.position, state.duration);
}

function updateProgress(pos, dur) {
  if (!dur) return;
  const pct = Math.min((pos / dur) * 100, 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeElapsed').textContent = msToTime(pos);
  document.getElementById('timeDuration').textContent = msToTime(dur);
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// Difficulty controls how many top tracks per artist are in the pool
// Easy = top 3 (most famous songs), Normal = top 5, Hard = top 10 (deeper cuts)
const DIFF_TOP_N = { easy: 3, normal: 5, hard: 10 };

async function getTrackFromPlaylist(cat) {
  const artistPool = CAT_ARTISTS[cat.name] || CAT_ARTISTS["Party Hits"];
  const topN = DIFF_TOP_N[difficulty];

  // Shuffle the artist pool for variety each round
  const shuffled = [...artistPool].sort(() => Math.random() - 0.5);

  for (const artistName of shuffled.slice(0, 5)) {
    // Find the artist on Spotify
    const searchParams = new URLSearchParams({ q: artistName, type: "artist", limit: 1, market: "MX" });
    const searchData = await spotifyFetch("https://api.spotify.com/v1/search?" + searchParams);
    const artist = searchData?.artists?.items?.[0];
    if (!artist) continue;

    // Skip if this artist played last round (anti-repeat)
    if (artist.id === lastArtistId) continue;

    // Get their top tracks in Mexico
    const topData = await spotifyFetch("https://api.spotify.com/v1/artists/" + artist.id + "/top-tracks?market=MX");
    const topTracks = topData?.tracks;
    if (!topTracks || topTracks.length === 0) continue;

    // Take top N based on difficulty, exclude already-played tracks
    const candidates = topTracks
      .slice(0, topN)
      .filter(t => t.uri && !usedTrackIds.has(t.id));

    if (candidates.length === 0) continue;

    // Pick a random track from candidates
    const track = candidates[Math.floor(Math.random() * candidates.length)];
    usedTrackIds.add(track.id);
    lastArtistId = artist.id;
    console.log("[Randomusik] Track found:", track.name, "-", artist.name);
    return track;
  }

  return null;
}

// ========== WHEEL ==========
let wheelAngle = 0;
let wheelSegments = [];

function buildWheel() {
  wheelSegments = selectedCats.map(i => CATEGORIES[i]);
  drawWheel(wheelAngle);
}

function drawWheel(angle) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = 150, cy = 150, r = 145;
  const n = wheelSegments.length;
  const arc = (2 * Math.PI) / n;
  ctx.clearRect(0, 0, 300, 300);
  ctx.save();
  ctx.shadowBlur = 30;
  ctx.shadowColor = 'rgba(147,51,234,0.5)';
  wheelSegments.forEach((seg, i) => {
    const start = angle + i * arc - Math.PI / 2;
    const end = start + arc;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.color + 'cc';
    ctx.fill();
    ctx.strokeStyle = '#0a0a0f';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
  ctx.restore();
  // Center
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(1, '#0a0a0f');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.font = '20px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🎵', cx, cy);
  // Labels
  wheelSegments.forEach((seg, i) => {
    const mid = angle + i * arc - Math.PI / 2 + arc / 2;
    const lx = cx + r * 0.62 * Math.cos(mid);
    const ly = cy + r * 0.62 * Math.sin(mid);
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(mid + Math.PI / 2);
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    const words = seg.name.split(' ');
    if (words.length > 1 && seg.name.length > 10) {
      ctx.font = 'bold 10px Nunito,sans-serif';
      ctx.fillText(seg.emoji, 0, -9);
      ctx.font = 'bold 9px Nunito,sans-serif';
      ctx.fillText(words[0], 0, 2);
      ctx.fillText(words.slice(1).join(' '), 0, 12);
    } else {
      ctx.font = 'bold 10px Nunito,sans-serif';
      ctx.fillText(seg.emoji, 0, -7);
      ctx.font = 'bold 9px Nunito,sans-serif';
      ctx.fillText(seg.name, 0, 5);
    }
    ctx.restore();
  });
}

function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  const extraSpins = 5 + Math.random() * 5;
  const targetAngle = wheelAngle + (2 * Math.PI * extraSpins) + (Math.random() * 2 * Math.PI);
  const duration = 3000 + Math.random() * 1000;
  const startAngle = wheelAngle;
  const startTime = performance.now();
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }
  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    wheelAngle = startAngle + (targetAngle - startAngle) * easeOut(progress);
    drawWheel(wheelAngle);
    if (progress < 1) requestAnimationFrame(animate);
    else { wheelAngle = targetAngle % (2 * Math.PI); onSpinEnd(); }
  }
  requestAnimationFrame(animate);
}

async function onSpinEnd() {
  const n = wheelSegments.length;
  const arc = (2 * Math.PI) / n;
  const normalized = (((-wheelAngle + Math.PI / 2) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const idx = Math.floor(normalized / arc) % n;
  currentCat = wheelSegments[idx];

  showLoading(`Buscando ${currentCat.emoji} ${currentCat.name}...`);

  try {
    const track = await getTrackFromPlaylist(currentCat);
    console.log('[Randomusik] track result:', track);
    if (!track) { hideLoading(); showToast('No se encontró canción, intenta de nuevo'); spinning = false; document.getElementById('spinBtn').disabled = false; return; }

    currentSong = track;
    await loadPlayingScreen(track, currentCat);
    await playTrack(track.uri);
    hideLoading();
    goTo('playing');
  } catch (e) {
    console.error(e);
    hideLoading();
    showToast('Error al cargar canción');
  }

  spinning = false;
  document.getElementById('spinBtn').disabled = false;
}

function renderPointBtns() {
  const div = document.getElementById('pointBtns');
  div.innerHTML = '<div style="font-size:0.75rem;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:0.3rem">¿Quién adivinó?</div>';
  players.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'point-btn';
    btn.innerHTML = `<span>${AVATARS[p.avatar % AVATARS.length]} ${p.name}</span><span class="point-badge">+1 pt</span>`;
    btn.onclick = () => awardPoint(p.name, btn);
    div.appendChild(btn);
  });
}

function awardPoint(name, btn) {
  scores[name] = (scores[name] || 0) + 1;
  btn.style.borderColor = 'var(--green)';
  btn.style.background = 'rgba(74,222,128,0.12)';
  document.querySelectorAll('.point-btn').forEach(b => b.disabled = true);
  renderScoreboard();
  if (round >= MAX_ROUNDS || Object.values(scores).some(s => s >= 10)) {
    document.getElementById('nextBtn').textContent = '🏆 Ver Ganador';
    document.getElementById('nextBtn').onclick = showWinner;
  }
}

async function nextRound() {
  await stopPlayback();
  round++;
  document.getElementById('roundNum').textContent = round;
  goTo('game');
}

// ========== SCOREBOARD ==========
function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  const maxPts = Math.max(0, ...Object.values(scores));
  players.forEach(p => {
    const pts = scores[p.name] || 0;
    const card = document.createElement('div');
    card.className = 'score-card' + (pts === maxPts && pts > 0 ? ' winner-glow' : '');
    card.innerHTML = `
      <div class="score-avatar" style="background:${AVATAR_COLORS[p.avatar % AVATAR_COLORS.length]}">${AVATARS[p.avatar % AVATARS.length]}</div>
      <div class="score-name">${p.name}</div>
      <div class="score-pts">${pts}</div>
    `;
    sb.appendChild(card);
  });
}

// ========== WINNER ==========
function showWinner() {
  stopPlayback();
  const sorted = players.map(p => ({ ...p, pts: scores[p.name] || 0 })).sort((a, b) => b.pts - a.pts);
  const w = sorted[0];
  document.getElementById('winnerName').textContent = w.name;
  document.getElementById('winnerPts').textContent = `${w.pts} punto${w.pts !== 1 ? 's' : ''}`;
  const fs = document.getElementById('finalScores');
  fs.innerHTML = '';
  ['🥇','🥈','🥉'].forEach((medal, i) => {
    if (!sorted[i]) return;
    const row = document.createElement('div');
    row.className = 'final-row' + (i === 0 ? ' top' : '');
    row.innerHTML = `<div class="rank">${medal}</div><div class="final-name">${AVATARS[sorted[i].avatar % AVATARS.length]} ${sorted[i].name}</div><div class="final-pts">${sorted[i].pts} pts</div>`;
    fs.appendChild(row);
  });
  goTo('winner');
}

function resetGame() {
  scores = {}; round = 1;
  players.forEach(p => scores[p.name] = 0);
  goTo('home');
}

// ========== START GAME ==========
function startGame() {
  if (selectedCats.length < 3) { showToast('Selecciona al menos 3 categorías'); return; }
  scores = {}; round = 1;
  usedTrackIds.clear();
  lastArtistId = null;
  players.forEach(p => scores[p.name] = 0);
  buildWheel();
  renderScoreboard();
  goTo('game');
}

// ========== SPOTIFY STATUS UI ==========
function setSpotifyConnected(name) {
  const status = document.getElementById('spotifyStatus');
  status.className = 'spotify-status connected';
  document.getElementById('spotifyStatusText').textContent = `Conectado como ${name}`;
  document.getElementById('spotifyBtn').classList.add('hidden');
  document.getElementById('playBtn').classList.remove('hidden');
}

// ========== INIT ==========
spawnNotes();
renderPlayers();
renderCats();

// Handle OAuth callback
(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    showLoading('Conectando con Spotify...');
    const token = await exchangeToken(code);
    if (token) {
      const me = await spotifyFetch('https://api.spotify.com/v1/me');
      if (me?.display_name) setSpotifyConnected(me.display_name);
      // Init player now that we have token
      if (window.Spotify) window.onSpotifyWebPlaybackSDKReady();
      showToast('✅ ¡Spotify conectado!');
    }
    hideLoading();
  } else if (getToken()) {
    // Already have token
    const me = await spotifyFetch('https://api.spotify.com/v1/me');
    if (me?.display_name) {
      setSpotifyConnected(me.display_name);
      if (window.Spotify) window.onSpotifyWebPlaybackSDKReady();
    }
  }
})();
</script>
